spring.application.name=PokemonAPI
# Configuración de conexión a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/pokemon_api_db?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=235621

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 'update' le dice a Hibernate que cree las tablas mágicamente
spring.jpa.hibernate.ddl-auto=update